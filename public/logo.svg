  </g>
  
  <text x="55" y="28" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">OWN</text>
  <text x="115" y="28" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#A0A0A0">DEV</text>
