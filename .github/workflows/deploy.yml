name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/owndev.ru

            echo "=== git pull ==="
            # Clean server-side conflicts before pull
            git checkout -- . || true
            git clean -fd --exclude='.env' --exclude='owndev-backend/.env' || true
            git pull origin main

            echo "=== backend build ==="
            cd owndev-backend
            npm install --include=dev
            npm run build

            echo "=== PM2 restart with env ==="
            node -e "
              const fs=require('fs');
              const env={};
              const envPath='/var/www/owndev.ru/.env';
              if(fs.existsSync(envPath)){
                fs.readFileSync(envPath,'utf8').split('\n').forEach(line=>{
                  const m=line.match(/^([^#=]+)=(.*)/);
                  if(m) env[m[1].trim()]=m[2].trim();
                });
              } else { console.log('WARNING: .env not found at',envPath); }
              const config={apps:[{
                name:'owndev-backend',
                script:'dist/index.js',
                cwd:'/var/www/owndev.ru/owndev-backend',
                instances:1,
                autorestart:true,
                env:env
              }]};
              fs.writeFileSync('ecosystem.config.cjs','module.exports='+JSON.stringify(config,null,2));
              console.log('Ecosystem written. OPENAI key present:', !!env['OPENAI_API_KEY']);
            "
            pm2 delete owndev-backend || true
            pm2 start ecosystem.config.cjs
            pm2 save

            echo "=== frontend build ==="
            cd /var/www/owndev.ru
            npm install
            npm run build

            echo "=== nginx config sync ==="
            NGINX_SRC=/var/www/owndev.ru/nginx/owndev.ru.conf
            NGINX_DST=/etc/nginx/sites-available/owndev.ru
            if [ -f "$NGINX_SRC" ]; then
              # Backup current config
              if [ -f "$NGINX_DST" ]; then
                sudo cp "$NGINX_DST" "$NGINX_DST.bak.$(date +%Y%m%d-%H%M%S)" || true
              fi
              # Copy new config from repo
              sudo cp "$NGINX_SRC" "$NGINX_DST"
              # Ensure site is enabled
              sudo ln -sf "$NGINX_DST" /etc/nginx/sites-enabled/owndev.ru
              # Validate and reload (with rollback on failure)
              if sudo nginx -t; then
                sudo systemctl reload nginx
                echo "nginx reloaded ok"
              else
                echo "nginx config invalid — rolling back"
                LATEST_BAK=$(ls -t "$NGINX_DST".bak.* 2>/dev/null | head -1)
                if [ -n "$LATEST_BAK" ]; then
                  sudo cp "$LATEST_BAK" "$NGINX_DST"
                  sudo nginx -t && sudo systemctl reload nginx
                fi
                exit 1
              fi
            else
              echo "WARNING: $NGINX_SRC not found — skipping nginx sync"
            fi

            echo "=== done ==="
            pm2 list
