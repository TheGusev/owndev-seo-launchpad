name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/owndev.ru

            echo "=== git pull ==="
            # Clean server-side conflicts before pull
            git checkout -- . || true
            git clean -fd --exclude='.env' --exclude='owndev-backend/.env' || true
            git pull origin main

            echo "=== backend build ==="
            cd owndev-backend
            npm install --include=dev
            npm run build

            echo "=== DB migrations (idempotent) ==="
            # Load DATABASE_URL from frontend .env (single source of truth) or backend .env
            if [ -f /var/www/owndev.ru/owndev-backend/.env ]; then
              set -a; . /var/www/owndev.ru/owndev-backend/.env; set +a
            elif [ -f /var/www/owndev.ru/.env ]; then
              set -a; . /var/www/owndev.ru/.env; set +a
            fi
            if [ -n "$DATABASE_URL" ]; then
              # Pre-mark legacy migrations 001-023 as already applied + clear stale 031 mark if needed
              node scripts/premark-legacy-migrations.cjs || { echo 'premark failed'; exit 1; }
              # Apply remaining V3 migrations (031-035) idempotently
              node dist/db/migrate.js || { echo 'migrate failed'; exit 1; }
            else
              echo 'WARNING: DATABASE_URL not set — skipping migrate'
            fi

            echo "=== PM2 restart with env ==="
            # Build ecosystem.config.cjs via repo script.
            # Reads .env layered (root first, owndev-backend/.env second so it wins).
            # Fails the deploy if OPENAI_API_KEY is missing.
            node scripts/build-pm2-ecosystem.cjs
            pm2 delete owndev-backend || true
            pm2 start ecosystem.config.cjs
            pm2 save

            echo "=== frontend build ==="
            cd /var/www/owndev.ru
            npm install
            npm run build

            echo "=== nginx config sync ==="
            NGINX_SRC=/var/www/owndev.ru/nginx/owndev.ru.conf
            NGINX_DST=/etc/nginx/sites-available/owndev.ru
            if [ -f "$NGINX_SRC" ]; then
              # Backup current config
              if [ -f "$NGINX_DST" ]; then
                sudo cp "$NGINX_DST" "$NGINX_DST.bak.$(date +%Y%m%d-%H%M%S)" || true
              fi
              # Copy new config from repo
              sudo cp "$NGINX_SRC" "$NGINX_DST"
              # Ensure site is enabled
              sudo ln -sf "$NGINX_DST" /etc/nginx/sites-enabled/owndev.ru
              # Validate and reload (with rollback on failure)
              if sudo nginx -t; then
                sudo systemctl reload nginx
                echo "nginx reloaded ok"
              else
                echo "nginx config invalid — rolling back"
                LATEST_BAK=$(ls -t "$NGINX_DST".bak.* 2>/dev/null | head -1)
                if [ -n "$LATEST_BAK" ]; then
                  sudo cp "$LATEST_BAK" "$NGINX_DST"
                  sudo nginx -t && sudo systemctl reload nginx
                fi
                exit 1
              fi
            else
              echo "WARNING: $NGINX_SRC not found — skipping nginx sync"
            fi

            echo "=== done ==="
            pm2 list
            echo "=== pm2 logs (last 60 lines) ==="
            pm2 logs owndev-backend --lines 60 --nostream || true
            echo "=== pm2 describe ==="
            pm2 describe owndev-backend || true
            echo "=== curl localhost:3001/api/health ==="
            curl -s -o /tmp/h -w 'HTTP %{http_code}\n' http://127.0.0.1:3001/api/health || true
            cat /tmp/h || true; echo
