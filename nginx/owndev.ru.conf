# Managed by repo: nginx/owndev.ru.conf
# Auto-deployed by .github/workflows/deploy.yml on push to main.
# Manual edits on the server WILL be overwritten on next deploy.

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name owndev.ru www.owndev.ru;
    return 301 https://owndev.ru$request_uri;
}

# www -> apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.owndev.ru;

    ssl_certificate     /etc/letsencrypt/live/owndev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/owndev.ru/privkey.pem;

    return 301 https://owndev.ru$request_uri;
}

# Main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name owndev.ru;

    ssl_certificate     /etc/letsencrypt/live/owndev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/owndev.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/owndev.ru/dist;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # --- Security headers (applied to ALL responses) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://mc.yandex.ru https://*.supabase.co https://api.owndev.ru; frame-ancestors 'self';" always;

    # --- Backend API proxy ---
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # --- security.txt (RFC 9116) ---
    location = /.well-known/security.txt {
        add_header Content-Type "text/plain; charset=utf-8" always;
        try_files $uri =404;
    }

    # --- Static assets: long-lived immutable cache ---
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|webp|ico|gif)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-emit security headers (add_header in nested block resets parent ones)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # --- SPA fallback: short cache for HTML so releases roll out fast ---
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://mc.yandex.ru https://*.supabase.co https://api.owndev.ru; frame-ancestors 'self';" always;
        try_files $uri /index.html;
    }

    # Hide nginx version
    server_tokens off;

    # Limits
    client_max_body_size 10m;
}